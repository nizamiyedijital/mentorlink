<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Giriş Yap — MentorLink</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/base.css">
<link rel="stylesheet" href="css/components.css">
<link rel="stylesheet" href="css/pages.css">
</head>
<body data-page="login">
<div data-navbar></div>
<div class="auth-container">
  <div class="auth-card">
    <h2>Tekrar hoş geldin 👋</h2>
    <p class="auth-sub">Hesabına giriş yap ve yolculuğuna devam et.</p>
    <form data-login-form>
      <div class="form-group">
        <label>E-posta</label>
        <input type="email" name="email" class="form-input" required>
      </div>
      <div class="form-group">
        <label>Şifre</label>
        <input type="password" name="password" class="form-input" required>
      </div>
      <div class="form-error hidden" data-error></div>
      <button type="submit" class="btn btn-primary btn-block btn-lg">Giriş Yap</button>
    </form>
    <div class="auth-alt">
      Henüz hesabın yok mu? <a href="register.html">Kayıt ol</a><br>
      <small class="text-muted">Demo admin: admin@demo / admin</small>
    </div>
  </div>
</div>

<script src="data/seed.js"></script>
<script src="js/storage.js"></script>
<script src="js/auth.js"></script>
<script src="js/components.js"></script>
<script src="js/mentors.js"></script>
<script src="js/availability.js"></script>
<script src="js/calendar.js"></script>
<script src="js/appointments.js"></script>
<script src="js/mentor-dashboard.js"></script>
<script src="js/training.js"></script>
<script src="js/quiz.js"></script>
<script src="js/admin.js"></script>
<script src="js/settings.js"></script>
<script src="js/pages.js"></script>
<script src="js/main.js"></script>
</body>
</html>
